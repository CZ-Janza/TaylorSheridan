name: Update catalog

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "config.json"
      - "scripts/generate.js"

permissions:
  contents: write

concurrency:
  group: update-catalog
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate catalog from TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/generate.js

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalog
          if git diff --cached --quiet; then
            echo "No catalog changes."
            exit 0
          fi
          git commit -m "Automatic catalog update ($(date -u +%Y-%m-%d))"
          # Concurrency safety: if another run pushed to main in the meantime,
          # pick it up via rebase and retry the push.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected, trying rebase (attempt $attempt)…"
            git pull --rebase origin main
          done
          echo "Push failed even after retries." >&2
          exit 1
